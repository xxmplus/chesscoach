name: ChessCoach
options:
  bundleIdPrefix: com.chesscoach
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    exactVersion: 0.15.0
  SwiftLlama:
    url: https://github.com/pgorzelany/swift-llama-cpp
    from: "1.0.0"

targets:
  ChessCoachShared:
    type: framework
    platform: iOS
    sources:
      - path: ChessCoachShared
        excludes:
          - "**/.DS_Store"
          - "**/*.gguf"
      - path: ChessCoachShared/Models
        type: folder
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "**/*.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chesscoach.shared
        INFOPLIST_FILE: ChessCoachShared/Info.plist
        DEFINES_MODULE: YES
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - package: SQLite
    info:
      path: ChessCoachShared/Info.plist
      properties:
        CFBundleDisplayName: ChessCoachShared
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: ""

  ChessCoachSharedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChessCoachSharedTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chesscoach.shared.tests
        INFOPLIST_FILE: ChessCoachSharedTests/Info.plist
        TESTED_PRODUCT_NAME: ChessCoachShared
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ChessCoachShared
    info:
      path: ChessCoachSharedTests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

  ChessCoachEngine:
    type: framework
    platform: iOS
    sources:
      - path: ChessCoachEngine
        excludes:
          - "**/.DS_Store"
          - "StockfishLoader.html"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chesscoach.engine
        INFOPLIST_FILE: ChessCoachEngine/Info.plist
        DEFINES_MODULE: YES
    dependencies:
      - target: ChessCoachShared
      - package: SwiftLlama
    info:
      path: ChessCoachEngine/Info.plist
      properties:
        CFBundleDisplayName: ChessCoachEngine
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: ""

  ChessCoachEngineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChessCoachEngineTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chesscoach.engine.tests
        INFOPLIST_FILE: ChessCoachEngineTests/Info.plist
        TESTED_PRODUCT_NAME: ChessCoachEngine
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ChessCoachEngine
    info:
      path: ChessCoachEngineTests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

  ChessCoachCoach:
    type: framework
    platform: iOS
    sources:
      - path: ChessCoachCoach
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chesscoach.coach
        INFOPLIST_FILE: ChessCoachCoach/Info.plist
        DEFINES_MODULE: YES
    dependencies:
      - target: ChessCoachShared
      - target: ChessCoachEngine
      - package: SQLite
    info:
      path: ChessCoachCoach/Info.plist
      properties:
        CFBundleDisplayName: ChessCoachCoach
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: ""

  ChessCoachCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChessCoachCoachTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chesscoach.coach.tests
        INFOPLIST_FILE: ChessCoachCoachTests/Info.plist
        TESTED_PRODUCT_NAME: ChessCoachCoach
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ChessCoachCoach
    info:
      path: ChessCoachCoachTests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

  ChessCoachApp:
    type: application
    platform: iOS
    sources:
      - path: ChessCoachApp
        excludes:
          - "**/.DS_Store"
    preBuildScripts:
      - name: Bootstrap dependencies
        script: |
          # Fail fast if build-time assets are missing.
          # Run './scripts/bootstrap.sh --fetch' to download them.
          "${PROJECT_DIR}/scripts/bootstrap.sh" --check
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.friday.chesscoach
        INFOPLIST_FILE: ChessCoachApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: ChessCoachShared
      - target: ChessCoachEngine
      - target: ChessCoachCoach
      - package: SQLite
    info:
      path: ChessCoachApp/Info.plist
      properties:
        CFBundleDisplayName: ChessCoach
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

  ChessCoachAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChessCoachAppTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.friday.chesscoach.tests
        TESTED_PRODUCT_NAME: ChessCoachApp
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ChessCoachApp
    info:
      path: ChessCoachAppTests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

schemes:
  ChessCoachApp:
    build:
      targets:
        ChessCoachApp: all
    test:
      config: Debug
      targets:
        - ChessCoachSharedTests
        - ChessCoachEngineTests
        - ChessCoachCoachTests
        - ChessCoachAppTests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ChessCoachShared:
    build:
      targets:
        ChessCoachShared: all
    test:
      config: Debug
      targets:
        - ChessCoachSharedTests
    run:
      config: Debug

  ChessCoachEngine:
    build:
      targets:
        ChessCoachEngine: all
    test:
      config: Debug
      targets:
        - ChessCoachEngineTests
    run:
      config: Debug

  ChessCoachCoach:
    build:
      targets:
        ChessCoachCoach: all
    test:
      config: Debug
      targets:
        - ChessCoachCoachTests
    run:
      config: Debug
